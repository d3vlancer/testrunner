name: iOS Remote Debugging Host

on:
  workflow_dispatch: 

jobs:
  configure-host:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1 
      with:
        xcode-version: '26.3'
 
    - name: Configure SSH Server with Public Key
      env:
        SSH_PUB_KEY: ${{ secrets.MACOS_SSH_PUB_KEY }}
        VNC_PASS: ${{ secrets.VNC_PWD }}
      run: |
        # Cria o diretório .ssh para o usuário 'runner'
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Injeta a sua chave pública do Windows no arquivo de chaves autorizadas do Mac
        echo "$SSH_PUB_KEY" >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        
        # Backup e Ajuste estrito do SSH do macOS para aceitar apenas chaves públicas
        sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak
        sudo sed -i '' 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/g' /etc/ssh/sshd_config
        
        # Reinicia o serviço de SSH do macOS para aplicar as regras
        sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
        
        echo "✅ Chave pública injetada e autorizada com sucesso!"
           
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw "$VNC_PASS"
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
        echo "✅ VNC Configurado com sucesso!"

    - name: Start Reverse SSH Tunnel (Pinggy)
      run: |
        ssh -T -n -p 443 -o StrictHostKeyChecking=no -o ExitOnForwardFailure=yes -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -R 0:localhost:22 qr+tcp@free.pinggy.io > pinggy.log &
        sleep 10
        cat pinggy.log
        
    - name: Keep Alive & Monitor Tunnel
      run: |
        echo "⏳ Monitorando o túnel do Pinggy... O job encerrará automaticamente se o túnel cair."
        
        # Loop que roda enquanto o processo do SSH do Pinggy (qr+tcp) estiver em execução
        while pgrep -f "qr\+tcp@free.pinggy.io" > /dev/null; do
          sleep 15
        done
        
        echo "🛑 O túnel do Pinggy foi encerrado (ou atingiu o limite de 1 hora)."
        echo "Encerrando o workflow com sucesso."
