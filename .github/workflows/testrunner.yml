name: iOS Remote Debugging Host

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Tunnel region (ex: us, eu, ap, sa)'
        required: true
        default: 'sa'

jobs:
  configure-host:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1 
      with:
        xcode-version: '26.3'
 
    - name: Configure SSH Server
      env:
        RUNNER_PWD: ${{ secrets.MACOS_RUNNER_PASSWORD }}
      run: |
        # Ativa o Login Remoto (SSH) no macOS
        sudo systemsetup -setremotelogin on
         
        sudo sysadminctl -password "$RUNNER_PWD" -user runner
         
        sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
         
        sudo launchctl kickstart -k system/com.openssh.sshd
   
    - name: Start Reverse SSH Tunnel (Pinggy)
      run: |
        # Usamos connect.pinggy.io para conexões TCP/SSH brutas.
        # -T desabilita a alocação de TTY para evitar o aviso de 'stdin is not a terminal'.
        # -n impede que o SSH tente ler a entrada padrão em background.
        ssh -T -n -o StrictHostKeyChecking=no -o ExitOnForwardFailure=yes -R 443:localhost:22 connect.pinggy.io > pinggy.log &
        
        # Aguarda o handshake da conexão SSH com o servidor do túnel
        sleep 10
        
        # Exibe o log gerado para capturar as informações de conexão
        cat pinggy.log
        
        # O Pinggy retorna no log uma linha como: "ssh -p 12345 user@connect.pinggy.io"
        PINGGY_CONN=$(grep -oE 'ssh -p [0-9]+ [a-zA-Z0-9]+@connect\.pinggy\.io' pinggy.log | head -n 1)
        
        if [ -z "$PINGGY_CONN" ]; then
          echo "❌ ERRO: O túnel reverso não pôde ser gerado. Verifique o log acima."
          exit 1
        fi
        
        echo "=========================================================="
        echo "CONEXÃO SSH DISPONÍVEL VIA TÚNEL REVERSO:"
        echo "Comando completo gerado: $PINGGY_CONN"
        echo "=========================================================="
        
        echo "PINGGY_CONN=$PINGGY_CONN" >> $GITHUB_ENV
 
    - name: Keep Alive & Listen for Connection
      run: |
        echo "waiting for connections..."
        touch /tmp/keepalive
        while [ -f /tmp/keepalive ]; do
          sleep 30
        done 
        echo "Exiting."
