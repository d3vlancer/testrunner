name: iOS Remote Debugging Host

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Tunnel region (ex: us, eu, ap, sa)'
        required: true
        default: 'sa'

jobs:
  configure-host:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1 
      with:
        xcode-version: '26.3'
 
    - name: Configure SSH Server
      env:
        RUNNER_PWD: ${{ secrets.MACOS_RUNNER_PASSWORD }}
      run: |
        # Ativa o Login Remoto (SSH) no macOS
        sudo systemsetup -setremotelogin on
         
        sudo sysadminctl -password "$RUNNER_PWD" -user runner
         
        sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
         
        sudo launchctl kickstart -k system/com.openssh.sshd
   
    - name: Setup & Start Telebit Tunnel
      run: |
        curl -fsSL https://get.telebit.io | bash
        
        # Aguarda 3 segundos para o daemon interno subir na memória
        sleep 3
        
        # Adiciona um túnel TCP apontando diretamente para a porta 22 (SSH do Mac)
        ~/telebit tunnel:add tcp 22
        
        # Coleta o status para gerar os logs e capturar a URL pública
        ~/telebit status > telebit.log
        cat telebit.log
        
        # Extrai o endereço gerado (Exemplo: tcp.telebit.cloud:12345 ou tcp.telebit.io:12345)
        TELEBIT_URL=$(grep -oE 'tcp\.telebit\.(io|cloud|net):[0-9]+' telebit.log | head -n 1)
        
        if [ -z "$TELEBIT_URL" ]; then
          echo "❌ ERRO: O túnel do Telebit não pôde ser gerado."
          exit 1
        fi
        
        echo "=========================================================="
        echo "CONEXÃO SSH DISPONÍVEL (TELEBIT):"
        echo "Endereço para o Pair to Mac: $TELEBIT_URL"
        echo "Usuário: runner"
        echo "Senha: [Definida no seu Secret MACOS_RUNNER_PASSWORD]"
        echo "=========================================================="
        
        echo "TELEBIT_URL=$TELEBIT_URL" >> $GITHUB_ENV
        
    - name: Start LocalXpose Tunnel (SSH Port 22)
      run: |
        /opt/homebrew/bin/loclx tunnel tcp --to :22 --region ${{ github.event.inputs.region }} > lx.log &
        sleep 5
        
        LX_URL=$(grep -oE '[a-z0-9]+\.loclx\.io:[0-9]+' lx.log | head -n 1)
        
        if [ -z "$LX_URL" ]; then
          echo "❌ ERRO: O túnel do LocalXpose não iniciou."
          cat lx.log
          exit 1
        fi
        
        echo "=========================================================="
        echo "CONEXÃO SSH DISPONÍVEL (LOCALXPOSE):"
        echo "Endereço: $LX_URL"
        echo "Usuário: runner"
        echo "=========================================================="
 
    - name: Keep Alive & Listen for Connection
      run: |
        echo "waiting for connections..."
        touch /tmp/keepalive
        while [ -f /tmp/keepalive ]; do
          sleep 30
        done 
        echo "Exiting."
