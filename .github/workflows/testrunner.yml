name: iOS Remote Debugging Host

on:
  workflow_dispatch: 

jobs:
  configure-host:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1 
      with:
        xcode-version: '26.3'
 
    - name: Configure SSH Server
      env:
        RUNNER_PWD: ${{ secrets.MACOS_RUNNER_PASSWORD }}
      run: |
        # 1. Altera a senha do usuário runner no sistema
        sudo sysadminctl -password "$RUNNER_PWD" -user runner
        
        # 2. Backup do arquivo de configuração do SSH
        sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak
        
        # 3. Força as diretivas de autenticação por senha no arquivo
        sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
        sudo sed -i '' 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
        sudo sed -i '' 's/#ChallengeResponseAuthentication yes/ChallengeResponseAuthentication yes/g' /etc/ssh/sshd_config
        sudo sed -i '' 's/ChallengeResponseAuthentication no/ChallengeResponseAuthentication yes/g' /etc/ssh/sshd_config
        
        # 4. Adiciona uma regra explícita permitindo o usuário runner logar por senha
        echo -e "\nMatch User runner\n    PasswordAuthentication yes\n    PermitTTY yes" | sudo tee -a /etc/ssh/sshd_config
        
        # 5. Reinicia o daemon do SSH aplicando as diretivas no nível do sistema
        sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
        
        echo "✅ Servidor SSH reconfigurado com sucesso para aceitar senhas."
   
    - name: Start Reverse SSH Tunnel (Pinggy)
      run: |
        # Adicionado o '-p 443' para o cliente SSH do Mac conectar na porta correta do Pinggy
        ssh -T -n -p 443 -o StrictHostKeyChecking=no -o ExitOnForwardFailure=yes -R 0:localhost:22 qr+tcp@free.pinggy.io > pinggy.log &
        
        # Aguarda 10 segundos para o handshake e a geração dos links
        sleep 10
        
        # Exibe o arquivo de log no console do GitHub Actions
        cat pinggy.log
        
        echo "=========================================================="
        echo "LOG DE CONEXÃO EXIBIDO ACIMA."
        echo "Abra o log desse step, procure pela linha 'Your tunnel is live at' "
        echo "e copie o endereço 'free.pinggy.io:PORTA' para usar no Visual Studio."
        echo "=========================================================="
 
    - name: Keep Alive & Listen for Connection
      run: |
        echo "waiting for connections..."
        touch /tmp/keepalive
        while [ -f /tmp/keepalive ]; do
          sleep 30
        done 
        echo "Exiting."
