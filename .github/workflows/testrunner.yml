name: iOS Remote Debugging Host

on:
  workflow_dispatch: 

jobs:
  configure-host:
    runs-on: macos-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Xcode 26.3
      uses: maxim-lobanov/setup-xcode@v1 
      with:
        xcode-version: '26.3'
 
    - name: Configure SSH Server with Public Key
      env:
        SSH_PUB_KEY: ${{ secrets.MACOS_SSH_PUB_KEY }}
        VNC_PASS: ${{ secrets.VNC_PWD }}
      run: |
        # Cria o diretório .ssh para o usuário 'runner'
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Injeta a sua chave pública do Windows no arquivo de chaves autorizadas do Mac
        echo "$SSH_PUB_KEY" >> ~/.ssh/authorized_keys
        chmod 600 ~/.ssh/authorized_keys
        
        # Backup e Ajuste estrito do SSH do macOS para aceitar apenas chaves públicas
        sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak
        sudo sed -i '' 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/g' /etc/ssh/sshd_config
        
        # Reinicia o serviço de SSH do macOS para aplicar as regras
        sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist
        sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist
        
        echo "✅ Public key successfully injected and authorized!"
           
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -clientopts -setvnclegacy -vnclegacy yes -setvncpw -vncpw "$VNC_PASS"
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
        echo "✅ VNC setup complete!"

    - name: Start Reverse SSH Tunnel (Pinggy)
      run: |
        ssh -T -n -p 443 -o StrictHostKeyChecking=no -o ExitOnForwardFailure=yes -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -R 0:localhost:22 qr+tcp@free.pinggy.io > pinggy.log &
        sleep 10
        cat pinggy.log
        PINGGY_INFO=$(grep -oE "[a-zA-Z0-9.-]+\.pinggy-free\.link:[0-9]+" pinggy.log || grep -oE "free\.pinggy\.io:[0-9]+" pinggy.log)
        
        URL=$(echo $PINGGY_INFO | cut -d':' -f1)
        PORTA=$(echo $PINGGY_INFO | cut -d':' -f2)
        echo "ssh -L 5900:127.0.0.1:5900 -p $PORTA runner@$URL"
      
    - name: Prepare macOS Graphical Session & Resolution
      run: |
        echo "🎬 Despertando o ambiente gráfico do macOS..."
        
        # 1. Configura o autologin para o usuário runner (evita tela de bloqueio travada)
        echo "Avoiding lock screen"
        sudo defaults write /Library/Preferences/com.apple.loginwindow autoLoginUser "runner"
        
        # 2. Força o Finder e o subsistema GUI a inicializarem para o ID do usuário runner
        echo "Finder and UI subsystem initalization for current user"
        RUNNER_UID=$(id -u runner)
        sudo launchctl kickstart -k gui/$RUNNER_UID/com.apple.finder 2>/dev/null || true
        
        # 3. Define uma resolução virtual estável via AppleScript (Simula um monitor ativo)
        echo "setting an stable UI resolution"
        sudo osascript -e 'tell application "Finder" to set desktop picture to POSIX file "/System/Library/Desktop Pictures/Solid Colors/Stone Gray.png"' 2>/dev/null || true
        
        # 4. Cria um dump de segurança para garantir que o subsistema gráfico não entre em repouso (Sleep)
        echo "safety dump for UI subsystem doesn't sleep"
        sudo pmset -a displaysleep 0 disksleep 0 sleep 0 iopsleep 0 2>/dev/null || true
        
        echo "✅ UI wake and ready for transmission!"

    - name: Keep Alive & Monitor Tunnel
      run: |
        echo "⏳ Monitoring Pinggy tunnel... this job finishes if it is expired or closed."
        
        # Loop que roda enquanto o processo do SSH do Pinggy (qr+tcp) estiver em execução
        while pgrep -f "qr\+tcp@free.pinggy.io" > /dev/null; do
          sleep 15
        done
        
        echo "🛑 Pinggy tunnel was closed or expired."
        echo "Encerrando o workflow com sucesso."
